version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./apps/backend/compliance_checker.db:/app/compliance_checker.db
    environment:
      - BACKEND_PORT=8000
      - UPLOAD_DIR=/app/uploads
      - FRONTEND_ORIGINS=http://localhost:5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
